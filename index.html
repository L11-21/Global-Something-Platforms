<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global | Something</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vTWGIF1Ri46GsKoa9ScaQQw0UyJ-uAs4VH_DcaLUSbVjZDO385C2Kj1RrSJdYw7lAUp6DoaQSzwsFnS/pubhtml" 
         target="_blank"
         class="text-3xl font-bold text-gray-900 hover:text-blue-600 transition">
        Global <span class="text-blue-600">|</span> Something
      </a>
      <nav class="space-x-8 text-gray-600">
        <a href="#sheet" class="hover:text-gray-900">View Data</a>
        <a href="#" class="hover:text-gray-900">About</a>
        <a href="#" class="hover:text-gray-900">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="bg-gradient-to-br from-gray-900 to-black text-white py-24">
    <div class="max-w-4xl mx-auto text-center px-6">
      <h1 class="text-5xl md:text-6xl font-bold mb-6">
        Global <span class="text-blue-500">|</span> Something
      </h1>
      <p class="text-xl text-gray-300 mb-10">
        Your centralized data hub. Live. Always up to date.
      </p>
      <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vTWGIF1Ri46GsKoa9ScaQQw0UyJ-uAs4VH_DcaLUSbVjZDO385C2Kj1RrSJdYw7lAUp6DoaQSzwsFnS/pubhtml" 
         target="_blank"
         class="inline-flex items-center gap-3 bg-white text-black px-8 py-4 rounded-xl font-semibold text-lg hover:bg-blue-50 transition">
        <i class="fas fa-external-link-alt"></i>
        Open Full Spreadsheet
      </a>
    </div>
  </section>

  <!-- Spreadsheet Section with Wolf Background spanning the entire block -->
<section id="sheet" class="relative max-w-7xl mx-auto px-6 py-16 rounded-3xl overflow-hidden bg-gray-900 text-white my-8">
  <!-- Wolf Background Layer (Increase opacity so it stands out behind everything) -->
  <div class="absolute inset-0 bg-[url('watermarked_img_3382051997766325272.png')] bg-cover bg-center opacity-30 z-0"></div>

  <!-- Content Layer sitting over the background image -->
  <div class="relative z-10">
    <!-- Header Block inside the section -->
    <div class="text-center mb-10">
      <h2 class="text-4xl font-semibold text-white">Live Data Dashboard</h2>
      <p class="text-gray-300 mt-3">Enterprise Agent Fabrics • FOF</p>
    </div>

    <!-- Embedded Spreadsheet with Semi-Transparent Glass Frame -->
    <div class="border border-white/20 rounded-2xl overflow-hidden shadow-2xl bg-white/80 backdrop-blur-md">
      <iframe 
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTWGIF1Ri46GsKoa9ScaQQw0UyJ-uAs4VH_DcaLUSbVjZDO385C2Kj1RrSJdYw7lAUp6DoaQSzwsFnS/pubhtml?widget=true&amp;headers=false" 
        width="100%" 
        height="800" 
        style="border: none;">
      </iframe>
    </div>
  </div>
</section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-12">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <p class="text-sm">© 2026 Global | Something • Enterprise Agent Fabrics</p>
    </div>
  </footer>

</body>
</html>
